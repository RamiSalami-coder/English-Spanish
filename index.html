<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Translator</title>
<style>
    * {
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        margin: 0;
        height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .card {
        backdrop-filter: blur(15px);
        background: rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 25px;
        width: 420px;
        color: white;
        box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }

    h2 {
        text-align: center;
        margin-bottom: 10px;
    }

    .lang-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        font-size: 14px;
    }

    .swap {
        cursor: pointer;
        padding: 5px 10px;
        border-radius: 8px;
        background: rgba(255,255,255,0.2);
        transition: 0.3s;
    }

    .swap:hover {
        background: rgba(255,255,255,0.3);
    }

    textarea {
        width: 100%;
        height: 90px;
        border-radius: 12px;
        border: none;
        padding: 10px;
        background: rgba(255,255,255,0.2);
        color: white;
        resize: none;
        outline: none;
    }

    textarea::placeholder {
        color: rgba(255,255,255,0.7);
    }

    .output {
        margin-top: 12px;
        padding: 10px;
        border-radius: 12px;
        background: rgba(0,0,0,0.2);
        min-height: 60px;
    }

    .buttons {
        display: flex;
        gap: 10px;
        margin-top: 12px;
    }

    button {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
    }

    .copy {
        background: #00c6ff;
        color: white;
    }

    .clear {
        background: rgba(255,255,255,0.2);
        color: white;
    }

    .status {
        text-align: center;
        font-size: 12px;
        margin-top: 8px;
        opacity: 0.8;
    }
</style>
</head>
<body>

<div class="card">
    <h2>Translator</h2>

    <div class="lang-bar">
        <span id="fromLang">English</span>
        <div class="swap" onclick="swapLang()">⇄</div>
        <span id="toLang">Spanish</span>
    </div>

    <textarea id="inputText" placeholder="Type..."></textarea>

    <div class="output" id="outputText">Translation appears here...</div>

    <div class="buttons">
        <button class="copy" onclick="copyText()">Copy</button>
        <button class="clear" onclick="clearText()">Clear</button>
    </div>

    <div class="status" id="status">Idle</div>
</div>

<script>
let from = "en";
let to = "es";
let timeout;

const input = document.getElementById("inputText");
const output = document.getElementById("outputText");
const status = document.getElementById("status");

input.addEventListener("input", () => {
    clearTimeout(timeout);

    if (!input.value.trim()) {
        output.innerText = "Translation appears here...";
        status.innerText = "Idle";
        return;
    }

    status.innerText = "Typing...";

    timeout = setTimeout(translateText, 400);
});

function translateText() {
    status.innerText = "Translating...";

    fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(input.value)}`)
    .then(res => res.json())
    .then(data => {
        output.innerText = data[0][0][0];
        status.innerText = "Done";
    })
    .catch(() => {
        output.innerText = "Error";
        status.innerText = "Error";
    });
}

function swapLang() {
    // swap values
    [from, to] = [to, from];

    // swap labels
    let fromLabel = document.getElementById("fromLang");
    let toLabel = document.getElementById("toLang");
    [fromLabel.innerText, toLabel.innerText] = [toLabel.innerText, fromLabel.innerText];

    // swap text
    let temp = input.value;
    input.value = output.innerText;
    output.innerText = temp;

    translateText();
}

function copyText() {
    navigator.clipboard.writeText(output.innerText);
}

function clearText() {
    input.value = "";
    output.innerText = "Translation appears here...";
    status.innerText = "Idle";
}
</script>

</body>
</html>
