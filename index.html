<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaSwap</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin: 0;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* FULLSCREEN APP */
.app {
    width: 100%;
    max-width: 500px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 15px;
    color: white;
}

/* HEADER */
.header {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 10px;
}

/* LANGUAGE BAR */
.lang-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 16px;
}

.swap {
    padding: 8px 14px;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    cursor: pointer;
}

/* TEXT AREAS */
textarea {
    width: 100%;
    flex: 1;
    border-radius: 15px;
    border: none;
    padding: 15px;
    font-size: 18px;
    background: rgba(255,255,255,0.2);
    color: white;
    outline: none;
    margin-bottom: 10px;
}

textarea::placeholder {
    color: rgba(255,255,255,0.7);
}

/* OUTPUT */
.output {
    flex: 1;
    border-radius: 15px;
    padding: 15px;
    font-size: 18px;
    background: rgba(0,0,0,0.25);
    margin-bottom: 10px;
    overflow-y: auto;
}

/* BUTTONS */
.buttons {
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    cursor: pointer;
}

.copy {
    background: #00c6ff;
    color: white;
}

.clear {
    background: rgba(255,255,255,0.2);
    color: white;
}

/* STATUS */
.status {
    text-align: center;
    font-size: 13px;
    margin-top: 6px;
    opacity: 0.8;
}

/* MOBILE TWEAKS */
@media (max-width: 500px) {
    .header {
        font-size: 20px;
    }

    textarea, .output {
        font-size: 17px;
    }
}
</style>
</head>

<body>

<div class="app">
    <div class="header">LinguaSwap</div>

    <div class="lang-bar">
        <span id="fromLang">English</span>
        <div class="swap" onclick="swapLang()">⇄</div>
        <span id="toLang">Spanish</span>
    </div>

    <textarea id="inputText" placeholder="Type here..."></textarea>

    <div class="output" id="outputText">Translation appears here...</div>

    <div class="buttons">
        <button class="copy" onclick="copyText()">Copy</button>
        <button class="clear" onclick="clearText()">Clear</button>
    </div>

    <div class="status" id="status">Idle</div>
</div>

<script>
let from = "en";
let to = "es";
let timeout;

const input = document.getElementById("inputText");
const output = document.getElementById("outputText");
const status = document.getElementById("status");

input.addEventListener("input", () => {
    clearTimeout(timeout);

    if (!input.value.trim()) {
        output.innerText = "Translation appears here...";
        status.innerText = "Idle";
        return;
    }

    status.innerText = "Typing...";

    timeout = setTimeout(translateText, 300);
});

function translateText() {
    status.innerText = "Translating...";

    fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(input.value)}`)
    .then(res => res.json())
    .then(data => {
        output.innerText = data[0][0][0];
        status.innerText = "Done";
    })
    .catch(() => {
        output.innerText = "Error";
        status.innerText = "Error";
    });
}

function swapLang() {
    [from, to] = [to, from];

    let fromLabel = document.getElementById("fromLang");
    let toLabel = document.getElementById("toLang");
    [fromLabel.innerText, toLabel.innerText] = [toLabel.innerText, fromLabel.innerText];

    let temp = input.value;
    input.value = output.innerText;
    output.innerText = temp;

    translateText();
}

function copyText() {
    navigator.clipboard.writeText(output.innerText);
}

function clearText() {
    input.value = "";
    output.innerText = "Translation appears here...";
    status.innerText = "Idle";
}
</script>

</body>
</html>
